name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest
        
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Run security audit
      run: |
        # Run pnpm audit and capture output
        audit_result=$(pnpm audit --json 2>&1)
        echo "$audit_result"
        
        # Check if there are any high or critical vulnerabilities
        high_critical_count=$(echo "$audit_result" | grep -E '"severity":\s*"(high|critical)"' | wc -l)
        
        if [ "$high_critical_count" -gt 0 ]; then
          echo "❌ Found $high_critical_count high or critical severity vulnerabilities!"
          echo "Security audit failed. Please review and fix the vulnerabilities above."
          exit 1
        else
          echo "✅ Security audit passed. No high or critical vulnerabilities found."
        fi